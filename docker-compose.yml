services:
  bot:
    build: .
    container_name: xdownloader-bot
    restart: unless-stopped
    environment:
      - DOWNLOADER_BOT_TOKEN=${DOWNLOADER_BOT_TOKEN}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-34456187}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-f451a6ed6c0b0f596bdbb7a5f3938440}
      - NGINX_DIR=/var/www/downloads
      - SERVER_URL=http://${SERVER_HOST:-localhost}:8080/files
    volumes:
      - downloads:/app/downloads
      - nginx-files:/var/www/downloads
      - ./x_cookies.txt:/app/x_cookies.txt:ro
      - ./www.instagram.com_cookies.txt:/app/www.instagram.com_cookies.txt:ro
      - ./telegram.session:/app/telegram.session:ro

  nginx:
    image: nginx:alpine
    container_name: xdownloader-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-files:/var/www/downloads

volumes:
  downloads:
  nginx-files:
