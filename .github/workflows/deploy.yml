name: Build, Test & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17  # v1.2.0
        env:
          DOWNLOADER_BOT_TOKEN: ${{ secrets.DOWNLOADER_BOT_TOKEN }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: DOWNLOADER_BOT_TOKEN,YOUTUBE_COOKIES
          script: |
            set -e
            DEPLOY_DIR=/home/ubuntu/xdownloader
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR" 2>/dev/null || mkdir -p "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              git init
              git remote add origin https://github.com/yevhenhrushko/telegram-downloader-bot.git
            fi
            cd "$DEPLOY_DIR"
            git fetch origin master
            git reset --hard origin/master
            echo "DOWNLOADER_BOT_TOKEN=$DOWNLOADER_BOT_TOKEN" > .env
            echo "SERVER_HOST=158.180.23.247" >> .env
            if [ -n "$YOUTUBE_COOKIES" ]; then
              printf '%s\n' "$YOUTUBE_COOKIES" > youtube_cookies.txt
            fi
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build --force-recreate
            sleep 5
            docker compose ps
            echo "--- Last 20 log lines ---"
            docker compose logs --tail=20
