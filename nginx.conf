server {
    listen 8080;
    server_name _;

    # Deny everything by default
    location / {
        return 403;
    }

    # Only serve direct file links (no directory listing, no trailing slash)
    location /files/ {
        alias /var/www/downloads/;
        autoindex off;

        # Block access to directory itself
        location = /files/ {
            return 403;
        }
    }
}
